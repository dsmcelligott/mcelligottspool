<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McElligott's Pool</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,.4),
                rgba(0,0,0,.4)
            ),
            url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4?auto=format&fit=crop&w=1600&q=80');

            background-size: cover;
            background-position: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .quote {
            font-size: 1.5rem;
            max-width: 700px;
            margin-bottom: 40px;
            font-style: italic;
        }

        .tagline {
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .button {
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 10px;
            font-size: 1.1rem;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: .9rem;
        }
    </style>
</head>

<body>

<div class="hero">

    <h1>McElligott's Pool</h1>

    <p class="quote">
        "You never know what you'll find in McElligott's Pool."
    </p>

    <div class="tagline">
        FAMILY • FAITH • HOSPITALITY • LEGACY
    </div>

    <a class="button" href="#">
        Enter the Family Portal
    </a>

    <div class="footer">
        Established January 7, 2011
    </div>

</div>

</body>
</html>
